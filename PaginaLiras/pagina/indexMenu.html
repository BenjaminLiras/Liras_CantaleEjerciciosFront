<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu - Autos</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- CSS externo -->
  <link rel="stylesheet" href="styleMenu.css">
</head>
<body>

  <div class="menu-root">

    <div class="global-header"><span>choose your machine</span></div>


    <!-- PORSCHE -->
    <div class="section s1">
      <div class="glow"></div>
      <div class="texto-creacion">Stuttgart · 1992</div>
      <div class="numero">01</div>
      <div class="section-inner">
        <span class="marca porsche">Porsche</span>
        <span class="nombre-auto">911</span>
        <span class="modelo">GT3 RS</span>
        <div class="linea-anim"></div>
        <a class="boton" href="porsche.html">Explorar <span class="arrow">→</span></a>
      </div>
    </div>

    <div class="divider d1"></div>

    <!-- LAMBORGHINI -->
    <div class="section s2" onclick="location.href='lamborghini.html'">
      <div class="glow"></div>
      <div class="texto-creacion">Sant'Agata · 2017</div>
      <div class="section-number">02</div>
      <div class="section-inner">
        <span class="marca lamb">Lamborghini</span>
        <span class="nombre-auto">Huracán</span>
        <span class="modelo">Performante</span>
        <div class="linea-anim"></div>
        <a class="boton" href="lamborghini.html">Explorar <span class="arrow">→</span></a>
      </div>
    </div>

    <div class="divider d2"></div>

    <!-- FORD -->
    <div class="section s3" onclick="location.href='ford.html'">
      <div class="glow"></div>
      <div class="texto-creacion">Le Mans · 1966</div>
      <div class="section-number">03</div>
      <div class="section-inner">
        <span class="marca ford">Ford</span>
        <span class="nombre-auto">GT40</span>
        <span class="modelo">Mk IV</span>
        <div class="linea-anim"></div>
        <a class="boton" href="ford.html">Explorar <span class="arrow">→</span></a>
      </div>
    </div>

  </div>

</body>
</html>
