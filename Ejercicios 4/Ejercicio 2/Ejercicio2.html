<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta de Usuario</title>
    <link rel="stylesheet" href="Ejercicio2.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="banner"></div>
            <div class="profile">
                <img src="lucas.jpg" alt="Foto de perfil" class="avatar">
                <h2 class="name">El pato Lucas</h2>
                <p class="city">La Pampa, Argentina</p>
            </div>
            <div class="stats">
                <div class="stat">
                    <span class="stat-number">67K</span>
                    <span class="stat-label">Seguidores</span>
                </div>
                <div class="stat">
                    <span class="stat-number">120K</span>
                    <span class="stat-label">Likes</span>
                </div>
                <div class="stat">
                    <span class="stat-number">15</span>
                    <span class="stat-label">Fotos</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
