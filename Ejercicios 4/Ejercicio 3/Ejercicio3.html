<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pato Lucas - Instagram</title>
    <link rel="stylesheet" href="Ejercicio3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <span class="nav-back"><i class="fa-solid fa-arrow-left"></i></span>
        <span class="nav-username">daffy.duck</span>
        <span class="nav-menu"><i class="fa-solid fa-ellipsis-vertical"></i></span>
    </nav>

    <!-- PERFIL -->
    <section class="profile-section">
        <div class="profile-header">
            <img src="imagenes/hechizerro.jpg"
                 alt="Pato Lucas" class="avatar">
            <div class="stats-row">
                <div class="stat">
                    <span class="stat-num">67</span>
                    <span class="stat-lbl">Publicaciones</span>
                </div>
                <div class="stat">
                    <span class="stat-num">15M</span>
                    <span class="stat-lbl">Seguidores</span>
                </div>
                <div class="stat">
                    <span class="stat-num">912</span>
                    <span class="stat-lbl">Seguidos</span>
                </div>
            </div>
        </div>

        <div class="profile-info">
            <p class="full-name">Pato Lucas</p>
            <p class="bio">🦆 Artista, comediante y eterno rival de Bugs Bunny.<br>
               Acme Co. Sponsored • Looney Tunes Universe 🌀</p>
            <a href="https://looneytunes.fandom.com/wiki/Looney_Tunes" class="web-link">www.looneytunes.com</a>
        </div>

        <div class="profile-actions">
            <button class="btn btn-follow">Seguir</button>
            <button class="btn btn-message">Mensaje</button>
            <button class="btn btn-more"><i class="fa-solid fa-user-plus"></i></button>
        </div>

        <!-- HISTORIAS DESTACADAS -->
        <div class="highlights">
            <div class="highlight">
                <div class="highlight-circle">
                    <img src="imagenes/facha.webp" alt="Carrera">
                </div>
                <span>Carrera</span>
            </div>
            <div class="highlight">
                <div class="highlight-circle">
                    <img src="imagenes/viajes.jpg" alt="Viajes">
                </div>
                <span>Viajes</span>
            </div>
            <div class="highlight">
                <div class="highlight-circle">
                    <img src="imagenes/amigos.jpg" alt="Amigos">
                </div>
                <span>Amigos</span>
            </div>
            <div class="highlight">
                <div class="highlight-circle">
                    <img src="imagenes/acme.jpg" alt="Acme">
                </div>
                <span>Acme</span>
            </div>
        </div>
    </section>

    <!-- TABS -->
    <div class="tabs">
        <button class="tab active"><i class="fa-solid fa-grip"></i></button>
        <button class="tab"><i class="fa-solid fa-film"></i></button>
        <button class="tab"><i class="fa-solid fa-tag"></i></button>
    </div>

    <!-- GRILLA DE PUBLICACIONES -->
    <section class="grid">
        <div class="grid-item">
            <img src="imagenes/aura.jpg" alt="Post 1">
        </div>
        <div class="grid-item">
            <img src="imagenes/basquet.jpg" alt="Post 2">
        </div>
        <div class="grid-item">
            <img src="imagenes/novia.jpg" alt="Post 3">
        </div>
        <div class="grid-item">
            <img src="imagenes/plata.webp" alt="Post 4">
        </div>
        <div class="grid-item">
            <img src="imagenes/batman.jpg" alt="Post 5">
        </div>
        <div class="grid-item">
            <img src="imagenes/conbugz.jpg" alt="Post 6">
        </div>
        <div class="grid-item">
            <img src="imagenes/alien.jpg" alt="Post 7">
        </div>
        <div class="grid-item">
            <img src="imagenes/porky.jpg" alt="Post 8">
        </div>
        <div class="grid-item">
            <img src="imagenes/hechizero2.jpg" alt="Post 9">
        </div>
    </section>


</body>
</html>
